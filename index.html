<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-Maker_</title>
    <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
    <style>
        :root {
            --bg: #323437;
            --main: #e2b714;
            --caret: #e2b714;
            --sub: #646669;
            --subAlt: #2c2e31;
            --text: #d1d0c5;
            --error: #ca4754;
        }

        * {
            box-sizing: border-box;
            cursor: default;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            padding: 55px 80px;
            -webkit-user-select: none;
            user-select: none;
            transition: all 0.25s ease;
        }

        #theme-name {
            font-size: 0.75rem;
            color: var(--sub);
            margin-left: -10px;
        }

        header h1 {
            font-size: 0.85rem;
            color: var(--text);
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 800;
            margin: 0;
        }
        
        .accent-color {
            color: var(--main);
            display: inline-block;
            width: 8.5px;
            height: 3.05px;
            background-color: var(--main);
            margin-left: 2px;
            vertical-align: baseline;
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            overflow: hidden;
        }

        .input-side {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding-right: 50px;
            min-width: 0;
            overflow: hidden;
            -webkit-mask-image: linear-gradient(to right, transparent 0px, transparent 100px, black 180px);
            mask-image: linear-gradient(to right, transparent 0px, transparent 100px, black 180px);
        }

        .input-container {
            font-size: 3.5rem;
            font-weight: 300;
            display: flex;
            align-items: center;
            white-space: nowrap; 
            position: relative;
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: text;
            border: none;
            outline: none;
            z-index: 10;
        }

        #typing-text {
            white-space: pre;
            pointer-events: none;
            color: var(--sub);
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 4.5rem;
            background-color: var(--main);
            margin: 0 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            flex-shrink: 0;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .qr-side {
            flex: 1;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 50px;
            max-width: 50%;
        }

        .qr-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
            flex-shrink: 0;
        }

        .qr-wrapper:active { transform: scale(0.95); }

        .corners {
            position: absolute;
            inset: 0;
            border: 5px solid var(--main);
            border-radius: 30px;
            -webkit-mask-image: 
                linear-gradient(black, black), linear-gradient(black, black),
                linear-gradient(black, black), linear-gradient(black, black);
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-size: 45px 45px; 
            -webkit-mask-position: 0 0, 100% 0, 0 100%, 100% 100%;
            z-index: 2;
            pointer-events: none;
        }

        .qr-icon {
            width: 200px;
            height: 200px;
            fill: var(--sub);
            opacity: 0.2;
        }

        canvas {
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
            width: 210px !important;
            height: 210px !important;
            padding: 12px;
            border-radius: 15px;
            z-index: 1;
        }

        canvas.show {
            opacity: 1;
        }

        #export-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(18, 18, 18, 0.8); /* Dunklerer Hintergrund */
            backdrop-filter: blur(12px); /* Der edle Apple-Look */
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: var(--bg);
            padding: 60px;
            border-radius: 40px;
            display: flex;
            gap: 80px;
            border: 1px solid var(--sub);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .modal-left h2 {
            font-size: 0.75rem;
            color: var(--main);
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        .export-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .export-item {
            padding: 15px 0;
            color: var(--text);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: color 0.2s;
        }

        .export-item:hover {
            color: var(--main);
        }

        .shortcut-hint {
            font-size: 0.7rem;
            color: var(--sub);
            border: 1px solid var(--sub);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: var(--sub);
            font-size: 0.75rem;
            letter-spacing: 1px;
            padding-bottom: 30px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-icon {
            width: 20px;
            height: 20px;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .footer-icon:hover {
            color: var(--main);
            cursor: pointer;
        }

    </style>
</head>
<body>

    <header>
        <h1>QR-Maker<span class="accent-color"></span></h1>
    </header>

    <main>
        <div class="input-side">
            <div class="input-container">
                <input type="text" id="hidden-input" spellcheck="false" autocomplete="off" autofocus>
                <span id="typing-text"></span>
                <span class="cursor"></span>
            </div>
        </div>

        <div class="qr-side">
            <div class="qr-wrapper" id="qr-display" title="click to download">
                <div class="corners"></div>
                <svg id="placeholder-icon" class="qr-icon" viewBox="0 0 24 24">
                    <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h3v2h-3v-2zm-3 0h2v2h-2v-2zm3 3h3v2h-3v-2zm-3 0h2v2h-2v-2zm3 3h3v2h-3v-2zm-3 0h2v2h-2v-2z"/>
                </svg>
            </div>
        </div>
    </main>

    <footer>
        <svg id="theme-toggle" class="footer-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-swatch-book-icon lucide-swatch-book" span="Theme switch"><path d="M11 17a4 4 0 0 1-8 0V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2Z"/><path d="M16.7 13H19a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H7"/><path d="M 7 17h.01"/><path d="m11 8 2.3-2.3a2.4 2.4 0 0 1 3.404.004L18.6 7.6a2.4 2.4 0 0 1 .026 3.434L9.9 19.8"/></svg>
        <div id="theme-name">Loading...</div>
        <svg id="export-trigger" class="footer-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-up-icon lucide-file-up"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></svg>
        <a href="https://github.com/korbi20/QR-Maker_" target="_blank" style="color: var(--sub); cursor: pointer; display: inline-block; transition: color 0.3s;" onmouseover="this.style.color='var(--main)'" onmouseout="this.style.color='var(--sub)'"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="pointer-events: none;"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg></a>
        <span><span id="version-display">v1.0.0</span>
    </footer>

    <div id="export-modal">
        <div class="modal-content">
            <div class="modal-left">
                <h2>EXPORT OPTIONS</h2>
                <div class="export-list">
                    <div class="export-item" onclick="downloadPNG()">PNG Image <span class="shortcut-hint">1</span></div>
                    <div class="export-item" onclick="downloadSVG()">SVG Vector <span class="shortcut-hint">2</span></div>
                    <div class="export-item" onclick="copyBase64()">Base64 Code <span class="shortcut-hint">3</span></div>
                </div>
            </div>
            <div id="modal-qr-preview" style="background: var(--bg); padding: 20px; border-radius: 20px;"></div>
        </div>
    </div>

    <script>
        const hiddenInput = document.getElementById('hidden-input');
        const textDisplay = document.getElementById('typing-text');
        const placeholderIcon = document.getElementById('placeholder-icon');
        const qrWrapper = document.getElementById('qr-display');
        const phrase = "your URL";
        
        let i = 0;
        let isFirstKey = true;
        let qrObj = null;
        let count = 0;

        function type() {
            if (i < phrase.length) {
                textDisplay.textContent += phrase.charAt(i);
                i++;
                setTimeout(type, 100);
            }
        }

        window.onload = () => {
            type();
            hiddenInput.focus();
        };

        document.body.onclick = () => hiddenInput.focus();

        hiddenInput.addEventListener('input', function() {
            let val = this.value;
            if (val.length === 0) {
                textDisplay.style.color = "var(--sub)";
                textDisplay.textContent = phrase;
                isFirstKey = true;
            } else {
                if (isFirstKey) {
                    textDisplay.style.color = "var(--text)";
                    isFirstKey = false;
                }
                textDisplay.textContent = val;
            }
        });

        hiddenInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim();
                if (val.length > 0) {
                    placeholderIcon.style.display = 'none';
                    
                    if (!qrObj) {
                        const canvas = document.createElement('canvas');
                        qrWrapper.appendChild(canvas);
                        qrObj = new QRious({
                            element: canvas,
                            size: 250,
                            value: val,
                            level: 'H',
                            background: 'transparent',
                            foreground: '#d1d0c5'
                        });
                    } else {
                        qrObj.value = val;
                    }

                    setTimeout(() => {
                        const canvas = qrWrapper.querySelector('canvas');
                        if (canvas) canvas.classList.add('show');
                    }, 50);

                    count++;
                }
            }
        });

        qrWrapper.onclick = async () => {
            const canvas = qrWrapper.querySelector('canvas');
            if (canvas) {
                canvas.toBlob(blob => {
                    const item = new ClipboardItem({ "image/png": blob });
                    navigator.clipboard.write([item]);
                    // Kleiner visueller Feedback-Effekt
                    qrWrapper.style.transform = "scale(1.1)";
                    setTimeout(() => qrWrapper.style.transform = "scale(1)", 200);
                    console.log("Copied to clipboard!");
                });
            }
        };

        async function updateVersion() {
            const versionElement = document.getElementById('version-display');
            if (!versionElement) return;
            try {
                const response = await fetch('https://api.github.com/repos/korbi20/QR-Maker_/releases/latest');
                if (response.ok) {
                    const data = await response.json();
                    versionElement.textContent = data.tag_name;
                }
            } catch (e) {
                versionElement.textContent = 'v1.0.0';
            }
        }
        window.addEventListener('load', updateVersion);


        /* == THEME SWITCHER ==  */
        let themes = [];
        let currentThemeIndex = 0;

        async function initThemes() {
            try {
                const response = await fetch('src/themes.json');
                themes = await response.json();
                
                // Letztes Theme aus dem Speicher laden oder Index 0
                currentThemeIndex = parseInt(localStorage.getItem('themeIndex')) || 0;
                
                applyTheme(currentThemeIndex);
            } catch (error) {
                console.error("Fehler beim Laden der themes.json:", error);
            }
        }

        function applyTheme(index) {
            const theme = themes[index];
            if (!theme) return;

            // Alle Farben als CSS-Variablen setzen
            Object.keys(theme).forEach(key => {
                if (key !== 'name') {
                    document.documentElement.style.setProperty(`--${key}`, theme[key]);
                }
            });

            // Namen anzeigen
            const nameDisplay = document.getElementById('theme-name');
            if (nameDisplay) nameDisplay.innerText = theme.name;

            // Wahl optional im Browser speichern
            localStorage.setItem('themeIndex', index);
        }

        document.getElementById('theme-toggle').onclick = () => {
            if (themes.length === 0) return;
            currentThemeIndex = (currentThemeIndex + 1) % themes.length;
            applyTheme(currentThemeIndex);
        };

        // Start
        initThemes();



        const exportTrigger = document.getElementById('export-trigger');
        const modal = document.getElementById('export-modal');

        // Modal öffnen
        exportTrigger.onclick = () => {
            modal.style.display = 'flex';
            
            // Optional: Den aktuellen QR-Code auch im Modal anzeigen
            const currentCanvas = qrWrapper.querySelector('canvas');
            const modalPreview = document.getElementById('modal-qr-preview');
            modalPreview.innerHTML = ''; // Vorherige Vorschau leeren
            if (currentCanvas) {
                const clone = currentCanvas.cloneNode(true);
                clone.style.opacity = "1"; // Sicherstellen, dass er sichtbar ist
                modalPreview.appendChild(clone);
            }
        };

        window.addEventListener('keydown', (e) => {
            const modal = document.getElementById('export-modal');
            if (modal.style.display === 'flex') {
                if (e.key === '1') downloadPNG();
                if (e.key === '2') downloadSVG();
                if (e.key === 'Escape') modal.style.display = 'none'; // Schließen mit Esc
            }
        });

    </script>
    <script type="module">
        import { setupExport } from './src/export.js';
        
        // Initialisiert alles: Button-Klicks, Tastenkürzel (via HTML) und Modal
        setupExport('export-trigger', 'export-modal', 'modal-qr-preview');
    </script>

</body>
</html>
